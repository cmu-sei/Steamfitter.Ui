@if (!!userScenario) {
  <div
    class="component-container elevate scroll-container"
    >
    <div class="cssLayoutRowStartCenter">
      <div class="cssLayoutRowSpaceBetween">
        <div class="sp-icon">
          <mat-icon
            class="icon-24px"
                       fontIcon="mdi-login"
            alt="input"
          ></mat-icon>
        </div>
        <div style="width: 40px"></div>
        <div class="title">
          <h4>Build and Execute a Task</h4>
        </div>
        <div style="width: 40px"></div>
      </div>
      <div class="add-margin" (click)="$event.stopPropagation()">
        <mat-form-field>
          <mat-label >Select a View</mat-label>
          <mat-select
            [value]="selectedView | async"
            (selectionChange)="onViewChange($event)"
            >
            @for (view of viewList | async; track view) {
              <mat-option [value]="view">
                {{ view.name }}
              </mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>
    </div>
    <div>
      <app-tasks
        [taskList]="taskList"
        [resultList]="results"
        [scenarioId]="userScenario.id"
        [isEditable]="true"
        [isExecutable]="true"
        (taskListChanged)="refreshTaskList()"
        (deleteTaskRequested)="deleteTask($event)"
      ></app-tasks>
    </div>
  </div>
}
