<div class="component-container elevate">
  <div class="add-margin">
    <div class="list-container">
      <app-scenario-list [scenarioList]="scenarioList$ | async" [selectedScenario]="selectedScenario$ | async"
        [isLoading]="isLoading$ | async" [views]="views$ | async" [statuses]="statuses$ | async"
        (itemSelected)="setActive($event)" (saveScenario)="saveScenario($event)"></app-scenario-list>
    </div>
  </div>
</div>
