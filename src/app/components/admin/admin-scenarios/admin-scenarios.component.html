@if (!selectedScenarioId) {
  <app-scenario-list class="background" fxFill fxLayout="row" fxLayoutAlign="center start"
    [isLoading]="loading$ | async" [scenarioList]="scenarios$ | async" [statuses]="statuses | async" [adminMode]="true"
    [views]="viewList | async" (itemSelected)="selectedScenarioId = $event">
  </app-scenario-list>
}

@if (selectedScenarioId) {
  <app-scenario-memberships [scenarioId]="selectedScenarioId" [embedded]="true"
  (goBack)="selectedScenarioId = null"></app-scenario-memberships>
}
