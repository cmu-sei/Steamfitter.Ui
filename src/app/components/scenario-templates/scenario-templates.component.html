<div class="component-container elevate">
  <div class="add-margin">
    <div class="list-container">
      <app-scenario-template-list [scenarioTemplateList]="scenarioTemplateList | async"
        [selectedScenarioTemplate]="selectedScenarioTemplate | async" [isLoading]="isLoading | async"
        (itemSelected)="setActive($event)"
        (saveScenarioTemplate)="saveScenarioTemplate($event)"></app-scenario-template-list>
    </div>
  </div>
</div>
