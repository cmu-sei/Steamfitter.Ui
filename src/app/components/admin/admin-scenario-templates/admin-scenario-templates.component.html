@if (!selectedScenarioTemplateId) {
  <app-scenario-template-list class="background" fxFill fxLayout="row"
    fxLayoutAlign="center start" [isLoading]="loading$ | async" [scenarioTemplateList]="scenarioTemplates$ | async"
    [adminMode]="true" (itemSelected)="selectedScenarioTemplateId = $event">
  </app-scenario-template-list>
}

@if (selectedScenarioTemplateId) {
  <app-scenario-template-memberships [scenarioTemplateId]="selectedScenarioTemplateId"
  [embedded]="true" (goBack)="selectedScenarioTemplateId = null"></app-scenario-template-memberships>
}
