<mat-toolbar class="toolbar" [style.backgroundColor]="'var(--mat-sys-primary)'"
  [style.color]="topbarTextColor"
  >
  <mat-toolbar-row>
    <span class="margin-auto">
      @if (sidenav && sidenav?.opened) {
        <button
          (click)="sidenavToggleFn()"
          mat-icon-button
          matTooltip="Close Sidebar"
          aria-label="Close Sidebar"
          >
          <mat-icon svgIcon="ic_chevron_left"></mat-icon>
        </button>
      }
      @if (sidenav && !sidenav?.opened) {
        <button
          (click)="sidenavToggleFn()"
          mat-icon-button
          matTooltip="Open Sidebar"
          aria-label="Open Sidebar"
          >
          <mat-icon svgIcon="ic_chevron_right"></mat-icon>
        </button>
      }
    </span>
    <span class="view-text">{{ title }}</span>
    <span class="spacer"></span>
    @if (currentUser$ | async; as currentUser) {
      <div
        class="user-text"
        >
        <button
          mat-button
          class="menu-trigger"
          [matMenuTriggerFor]="menu"
          style="outline: none"
          >
          <span class="username-text">{{ currentUser.name }}</span>
          <mat-icon svgIcon="ic_expand_more"></mat-icon>
        </button>
        <mat-menu #menu="matMenu" [overlapTrigger]="false">
          @if (topbarView === TopbarView.STEAMFITTER_ADMIN) {
            <button
              [routerLink]="['/']"
              mat-menu-item
              >
              Exit Administration
            </button>
          }
          @if (canViewAdmin && topbarView !== TopbarView.STEAMFITTER_ADMIN) {
            <button
              [routerLink]="['/admin']"
              mat-menu-item
              >
              Administration
            </button>
          }
          <button mat-menu-item (click)="logout()">Logout</button>
          <mat-slide-toggle
            aria-labelledby="theme-toggle"
            class="mat-menu-item"
            color="primary"
            [checked]="(theme$ | async) === 'dark-theme' ? true : false"
            (click)="$event.stopPropagation()"
            (change)="themeFn($event)"
            >
            <mat-label id="theme-toggle">Dark Theme</mat-label>
          </mat-slide-toggle>
        </mat-menu>
      </div>
    }
  </mat-toolbar-row>
</mat-toolbar>
